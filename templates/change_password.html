{% extends "base.html" %}

{% block title %}Change Password | CopVizz{% endblock %}

{% block content %}

<div class="container my-5">

    <div class="row justify-content-center">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0"></h4>

            <a href="{{ url_for('auth.update_profile') }}" class="btn btn-outline-dark btn-sm">
                ← Back
            </a>
        </div>
        <div class="col-md-5">
            <div class="profile-card">

                <h4 class="fw-bold text-center mb-3">Change Password</h4>

                <!-- FLASH MESSAGES -->
                {% for message in get_flashed_messages() %}
                {% if 'success' in message.lower() %}
                <div class="alert alert-success text-center py-2">{{ message }}</div>
                {% else %}
                <div class="alert alert-danger text-center py-2">{{ message }}</div>
                {% endif %}
                {% endfor %}

                <form method="POST">

                    <div class="mb-3">
                        <label class="form-label">Current Password</label>
                        <input type="password" name="current_password" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">New Password</label>
                        <input type="password" name="new_password" class="form-control" required minlength="6">
                    </div>

                    <button type="submit" class="btn btn-dark w-100">
                        Update Password
                    </button>

                </form>

                <!-- BACK BUTTON -->


            </div>

        </div>

    </div>

</div>

<style>
    /* SAME STYLE AS PROFILE */
    .profile-card {
        background: #fff;
        padding: 25px;
        border-radius: 14px;
        border: 1px solid #eee;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
    }
</style>

{% endblock %}
